<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/assets/images/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZPluse News - Tech News & Business Insights | Next-Gen Digital Magazine</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="ZPluse News delivers cutting-edge tech news, startup insights, AI developments, and business analysis. Your next-gen digital magazine for the tech-savvy reader." />
  <meta name="keywords"
    content="tech news, AI, startups, business news, technology trends, digital magazine, innovation, economics, polity, sports, environment" />
  <meta name="author" content="ZPluse News" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <link rel="canonical" href="https://zplusenews.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zplusenews.com/" />
  <meta property="og:title" content="ZPluse News - Next-Gen Tech & Business Magazine" />
  <meta property="og:description"
    content="Cutting-edge tech news, startup insights, and business analysis for the modern reader." />
  <meta property="og:image" content="https://zplusenews.com/assets/images/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="ZPluse News" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@zplusenews" />
  <meta name="twitter:creator" content="@zplusenews" />
  <meta name="twitter:title" content="ZPluse News - Tech News & Business Insights" />
  <meta name="twitter:description" content="Cutting-edge tech news, startup insights, and business analysis." />
  <meta name="twitter:image" content="https://zplusenews.com/assets/images/og-image.png" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#AA2123" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Structured Data - WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ZPluse News",
    "url": "https://zplusenews.com",
    "description": "Your next-gen digital magazine for tech news, startup insights, and business analysis.",
    "publisher": {
      "@type": "Organization",
      "name": "ZPluse News",
      "logo": {
        "@type": "ImageObject",
        "url": "https://zplusenews.com/assets/images/logo.png"
      }
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://zplusenews.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Structured Data - NewsMediaOrganization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "ZPluse News",
    "url": "https://zplusenews.com",
    "logo": "https://zplusenews.com/assets/images/logo.png",
    "foundingDate": "2020",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+91-80-4567-8900",
      "contactType": "customer service",
      "availableLanguage": ["English", "Hindi"]
    },
    "sameAs": [
      "https://facebook.com/zplusenews",
      "https://twitter.com/zplusenews",
      "https://instagram.com/zplusenews",
      "https://linkedin.com/company/zplusenews",
      "https://youtube.com/@zplusenews"
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
