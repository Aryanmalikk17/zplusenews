services:
  - type: web
    name: zplusenews
    env: node
    rootDir: BizzShort
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: CORS_ORIGIN
        sync: false
      - key: SETUP_KEY
        generateValue: true
